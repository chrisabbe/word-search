<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle On Its Way</title>

<style>
  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#ffffff;
    color:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    text-align:center;
    padding:20px;
  }

  .box{
    max-width:420px;
  }

  h1{
    color:#008080;
    font-size:26px;
    margin-bottom:12px;
  }

  p{
    font-size:15px;
    line-height:1.6;
    color:#555;
  }

  .logo{
    width:180px;
    margin-bottom:18px;
  }
</style>
</head>

<body>

<div class="box">

<img class="logo" src="https://chrisabbe.github.io/Solutions/assets/inbox-puzzles-logo.png" alt="Inbox Puzzles">

<h1>Your puzzle is on its way</h1>

<p>
This puzzle isn’t available just yet.<br><br>
Your daily puzzle email should arrive shortly.
</p>

<p style="margin-top:16px; font-size:13px; color:#777;">
If you opened this early, just check back in a bit.
</p>

</div>

</body>
</html>
